<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>hypergravity</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="hg-popup">
            <div class="hg-popup-header">
                <img
                    src="/icons/icon48.png"
                    alt="hypergravity"
                    class="hg-popup-icon"
                />
                <div class="hg-popup-title-group">
                    <h1 class="hg-popup-title">hypergravity</h1>
                    <span class="hg-popup-version" id="hg-version"></span>
                </div>
            </div>

            <div class="hg-popup-stats">
                <div class="hg-popup-stat-row">
                    <span class="hg-popup-stat-label">Cached token counts</span>
                    <span class="hg-popup-stat-value" id="hg-cache-entries"
                        >—</span
                    >
                </div>
            </div>

            <div class="hg-popup-actions">
                <button class="hg-popup-btn" id="hg-export-btn">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Export Data
                </button>
                <button class="hg-popup-btn" id="hg-import-btn">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    Import Data
                </button>
                <input
                    type="file"
                    id="hg-import-input"
                    accept=".gz"
                    hidden
                />
            </div>

            <div class="hg-popup-status" id="hg-status"></div>
        </div>
        <script src="popup.js" type="module"></script>
    </body>
</html>
